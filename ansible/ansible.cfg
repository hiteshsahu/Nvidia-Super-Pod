[defaults]
inventory          = inventory/
remote_user        = ubuntu
private_key_file   = ~/.ssh/id_rsa
host_key_checking  = False
stdout_callback    = yaml
gathering          = smart
fact_caching       = memory
retry_files_enabled = False

[ssh_connection]
pipelining  = True
ssh_args    = -o StrictHostKeyChecking=no -o ControlMaster=auto -o ControlPersist=300s
