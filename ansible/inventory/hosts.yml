---
# Static fallback inventory — use when AWS credentials are not available.
# Replace the IP with the value from: terraform output gpu_node_public_ip

all:
  children:
    gpu_nodes:
      hosts:
        superpod-node-01:
          ansible_host: "REPLACE_WITH_GPU_NODE_IP"
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
