####################################################################
# kube-prometheus-stack — Helm Values
# Chart : prometheus-community/kube-prometheus-stack
# Docs  : https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
# 📊 : Monitoring Dashboard
#
# Install:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install prometheus prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     --version 58.x \
#     -f kubernetes/monitoring/prometheus/values.yaml
####################################################################

prometheus:
  prometheusSpec:
    # Scrape all ServiceMonitors regardless of namespace or label selector.
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}

    scrapeInterval: 15s
    evaluationInterval: 15s
    retention: 15d
    retentionSize: 10GB

    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 4Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi

    # Scrape GPU node exporter and DCGM on the host network port if no service is found.
    additionalScrapeConfigs:
      - job_name: dcgm-exporter-host
        static_configs:
          - targets: ["localhost:9400"]
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance

grafana:
  enabled: true
  # Change this before exposing Grafana externally.
  adminPassword: "superpod-changeme"

  service:
    type: NodePort
    nodePort: 30300

  # Load dashboards from any ConfigMap labelled grafana_dashboard: "1" across all namespaces.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL

  additionalDataSources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-operated.monitoring.svc.cluster.local:9090
      isDefault: false
      access: proxy

  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/"
    auth.anonymous:
      enabled: false
    dashboards:
      default_home_dashboard_path: /tmp/dashboards/gpu-cluster.json

alertmanager:
  # Enable and configure routes when alert routing to Slack / PagerDuty is needed.
  enabled: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

# Single-node lab: disable HA components that require multiple nodes.
prometheusOperator:
  admissionWebhooks:
    enabled: true
  tls:
    enabled: true
