####################################################################
# PyTorch GPU Benchmark Job
# Runs a synthetic ResNet-50 throughput benchmark on a single T4 GPU.
#
# Usage:
#   kubectl apply -f kubernetes/workloads/pytorch-job.yaml
#   kubectl logs -n training job/pytorch-benchmark -f
#   kubectl delete job pytorch-benchmark -n training   # cleanup
####################################################################

apiVersion: v1
kind: ServiceAccount
metadata:
  name: pytorch-benchmark
  namespace: training
automountServiceAccountToken: false

---
apiVersion: batch/v1
kind: Job
metadata:
  name: pytorch-benchmark
  namespace: training
  labels:
    app: pytorch-benchmark
    app.kubernetes.io/part-of: superpod
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 2
  template:
    metadata:
      labels:
        app: pytorch-benchmark
    spec:
      restartPolicy: OnFailure
      serviceAccountName: pytorch-benchmark
      automountServiceAccountToken: false

      containers:
        - name: pytorch
          image: nvcr.io/nvidia/pytorch:24.01-py3
          command:
            - python3
            - -c
            - |
              import sys, time, torch, torchvision.models as models

              if not torch.cuda.is_available():
                  print("ERROR: no GPU visible to PyTorch", file=sys.stderr)
                  sys.exit(1)

              device = torch.device("cuda")
              props  = torch.cuda.get_device_properties(0)

              print(f"GPU      : {props.name}")
              print(f"VRAM     : {props.total_memory / 1e9:.1f} GB")
              print(f"SMs      : {props.multi_processor_count}")
              print(f"PyTorch  : {torch.__version__}")
              print(f"CUDA     : {torch.version.cuda}")
              print()

              # ResNet-50 forward+backward throughput benchmark
              BATCH       = 64
              WARMUP_STEPS = 5
              TIMED_STEPS  = 50

              model     = models.resnet50().to(device)
              optimizer = torch.optim.SGD(model.parameters(), lr=0.01, momentum=0.9)
              criterion = torch.nn.CrossEntropyLoss()

              dummy_x = torch.randn(BATCH, 3, 224, 224, device=device)
              dummy_y = torch.randint(0, 1000, (BATCH,), device=device)

              model.train()
              print(f"Warming up ({WARMUP_STEPS} steps)...")
              for _ in range(WARMUP_STEPS):
                  optimizer.zero_grad()
                  criterion(model(dummy_x), dummy_y).backward()
                  optimizer.step()

              torch.cuda.synchronize()
              print(f"Benchmarking ({TIMED_STEPS} steps, batch={BATCH})...")
              t0 = time.perf_counter()
              for _ in range(TIMED_STEPS):
                  optimizer.zero_grad()
                  criterion(model(dummy_x), dummy_y).backward()
                  optimizer.step()
              torch.cuda.synchronize()
              elapsed = time.perf_counter() - t0

              throughput = TIMED_STEPS * BATCH / elapsed
              ms_per_step = elapsed / TIMED_STEPS * 1000

              print()
              print(f"Throughput  : {throughput:,.0f} samples / sec")
              print(f"Latency     : {ms_per_step:.1f} ms / step")
              print()
              print("Benchmark complete.")

          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: "2"
              memory: 8Gi
              ephemeral-storage: 2Gi
            requests:
              nvidia.com/gpu: 1
              cpu: "2"
              memory: 8Gi
              ephemeral-storage: 2Gi

          env:
            - name: NCCL_DEBUG
              value: WARN
            - name: PYTHONUNBUFFERED
              value: "1"

          volumeMounts:
            - name: data
              mountPath: /mnt/data
            # Large shared-memory segment for DataLoader workers.
            - name: shm
              mountPath: /dev/shm

      volumes:
        - name: data
          hostPath:
            path: /mnt/data
            type: DirectoryOrCreate
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi

      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

      nodeSelector:
        nvidia.com/gpu.present: "true"
